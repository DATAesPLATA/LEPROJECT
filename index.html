<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#1A1A1A"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Data Es Plata</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--mg:#C0157A;--mg2:#8A0F57;--blk:#1A1A1A;--sb:env(safe-area-inset-bottom,0px)}
html,body{height:100%;background:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#app{max-width:390px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;background:#fff;position:relative;overflow:hidden}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.screen.active{display:flex}

/* TOPBAR & NAV */
.topbar{background:#1A1A1A;padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tlogo{font-size:14px;font-weight:800;color:#fff;letter-spacing:.05em;text-transform:uppercase}
.tlogo span{color:#C0157A}
.bpts{background:#C0157A;color:#fff;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px}
.bnav{display:flex;border-top:1.5px solid #1A1A1A;background:#fff;padding-bottom:var(--sb);flex-shrink:0}
.nb{flex:1;padding:10px 0 8px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase}
.nb.on{color:#C0157A}
.ni{font-size:20px;line-height:1}

/* FORMS Y BOTONES */
.login-wrap{display:flex;flex-direction:column;align-items:center;padding:0 24px 32px;gap:14px;overflow-y:auto;height:100%}
.beans-stage{width:100%;height:160px;position:relative;flex-shrink:0;overflow:hidden}
.bbean{position:absolute;bottom:0;object-fit:contain}
.bbean.frijo{left:-6px;width:132px;animation:bobF 2.2s ease-in-out infinite}
.bbean.lito{right:-6px;width:115px;animation:bobL 2.6s ease-in-out infinite;animation-delay:.4s}
@keyframes bobF{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
@keyframes bobL{0%,100%{transform:translateY(-5px) rotate(4deg)}50%{transform:translateY(7px) rotate(-4deg)}}
.brand{text-align:center;margin-bottom:10px}
.d1{font-size:24px;font-weight:800;color:#1A1A1A;letter-spacing:.06em;text-transform:uppercase;line-height:1.1}
.d2{font-size:24px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;line-height:1.1}
.d2 .mg{color:#C0157A}
.slogan{font-size:11px;background:#1A1A1A;color:#fff;font-weight:700;padding:4px 16px;border-radius:20px;margin-top:6px;display:inline-block;text-transform:uppercase}
.inp{width:100%;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:15px;color:#1A1A1A;background:#fff;outline:none;transition:border-color .15s}
.inp:focus{border-color:#C0157A}
.btn-mg{width:100%;padding:14px;background:#C0157A;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;text-transform:uppercase}
.btn-mg:disabled{background:#ddd;cursor:default}
.btn-ghost{width:100%;padding:12px;border:1.5px solid #e0e0e0;border-radius:10px;background:none;color:#888;font-size:13px;font-weight:700;cursor:pointer;text-transform:uppercase}
.login-err{font-size:13px;color:#C0157A;text-align:center;display:none;padding:8px;background:#FCEBEB;border-radius:8px;width:100%}

/* OTP INPUTS */
.otp-inputs{display:flex;gap:8px;justify-content:center;margin:10px 0}
.otp-input{width:44px;height:54px;border:1.5px solid #e0e0e0;border-radius:10px;text-align:center;font-size:22px;font-weight:700;color:#1A1A1A;outline:none}
.otp-input:focus{border-color:#C0157A}

/* SWIPER */
#s-swiper{overflow:hidden}
.sw-hdr{background:#1A1A1A;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sw-title{font-size:13px;font-weight:700;color:#fff;text-transform:uppercase}
.sw-body{flex:1;display:flex;flex-direction:column;align-items:center;padding:14px 16px 10px;gap:10px;overflow:hidden;min-height:0}
.sw-hint{font-size:13px;color:#888;text-align:center;flex-shrink:0}
.sw-prog-wrap{width:100%;height:5px;background:#eee;border-radius:5px;overflow:hidden;flex-shrink:0}
.sw-prog{height:100%;background:#C0157A;border-radius:5px;transition:width .3s}
.card-stack{position:relative;width:100%;max-width:290px;flex:1;min-height:220px;max-height:310px;flex-shrink:0}
.swipe-card{position:absolute;inset:0;background:#fff;border:1.5px solid #1A1A1A;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px 16px;transition:transform .32s,opacity .32s;cursor:grab;user-select:none;will-change:transform}
.swipe-card:active{cursor:grabbing}
.swipe-card.gone{transform:translateX(-140%) rotate(-22deg)!important;opacity:0;pointer-events:none}
.swipe-card.liked{transform:translateX(140%) rotate(22deg)!important;opacity:0;pointer-events:none}
.card-emoji{font-size:56px;line-height:1}
.card-name{font-size:17px;font-weight:700;color:#1A1A1A;text-align:center}
.card-brand{font-size:13px;color:#888;text-align:center}
.ind{position:absolute;top:14px;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;opacity:0;transition:opacity .1s;pointer-events:none;text-transform:uppercase}
.ind-y{right:14px;background:#C0157A;color:#fff}
.ind-n{left:14px;background:#1A1A1A;color:#fff}
.sw-empty{display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;text-align:center;flex:1}
.sw-empty.show{display:flex}
.sw-btns{display:flex;gap:20px;flex-shrink:0}
.sw-btn{width:62px;height:62px;border-radius:50%;border:1.5px solid #1A1A1A;background:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sw-btn.yes{border-color:#C0157A;color:#C0157A}
.sw-count{font-size:12px;color:#aaa;flex-shrink:0}

/* LISTAS PROMOS Y PERFIL */
.scrollbody{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch;min-height:0}
.slbl{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;margin:16px 0 8px}
.slbl:first-child{margin-top:0}
.empty-state{text-align:center;padding:40px 24px;color:#aaa;font-size:14px}
.pc{display:flex;align-items:center;gap:12px;padding:12px 13px;border:1.5px solid #1A1A1A;border-radius:14px;margin-bottom:10px;background:#fff;cursor:pointer}
.pc.locked{border-color:#e0e0e0;opacity:.75}
.pci{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:26px;border:1px solid #eee}
.pci-info{flex:1;min-width:0}
.pci-name{font-size:13px;font-weight:700;color:#1A1A1A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pci-meta{font-size:11px;color:#888;margin-top:2px}
.ptag{font-size:10px;padding:4px 10px;border-radius:20px;font-weight:700;text-transform:uppercase}
.ptag-ok{background:#C0157A;color:#fff}
.ptag-lk{background:#eee;color:#999}

/* MODALES */
.pts-modal{position:absolute;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:200;padding:24px}
.pts-modal.show{display:flex}
.pts-box{background:#fff;border-radius:18px;padding:24px 20px;width:100%;max-width:300px;text-align:center}
.pts-ico{font-size:48px;margin-bottom:10px}
.pts-title{font-size:16px;font-weight:800;color:#1A1A1A;margin-bottom:6px}
.pts-num{font-size:30px;font-weight:800;color:#C0157A;margin:8px 0}
.pts-msg{font-size:13px;color:#888;line-height:1.6;margin-bottom:16px}
.umodal{position:absolute;inset:0;background:rgba(0,0,0,.78);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;padding:16px}
.umodal.show{display:flex}
.ubox{background:#fff;border-radius:20px;border:2px solid #C0157A;padding:22px 18px 18px;width:100%;max-width:300px;text-align:center;position:relative;z-index:202}
.ucode{font-size:24px;font-weight:800;letter-spacing:.15em;color:#C0157A;margin:10px 0;padding:12px;background:#F5D0E8;border-radius:12px}

/* PERFIL FORMULARIO ORIGINAL */
.ph{display:flex;align-items:center;gap:14px;padding:14px;background:#1A1A1A;border-radius:14px;margin-bottom:14px}
.av{width:52px;height:52px;border-radius:50%;background:#C0157A;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;overflow:hidden;cursor:pointer}
.av img{width:100%;height:100%;object-fit:cover}
.pname{font-size:16px;font-weight:700;color:#fff}
.prole{font-size:12px;color:#aaa;margin-top:2px}
.pf-field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.pf-field label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase}
.pf-field input,.pf-field select{padding:10px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;width:100%}
.updbtn{padding:12px;border:1.5px solid #1A1A1A;border-radius:10px;background:none;color:#1A1A1A;font-size:13px;font-weight:700;cursor:pointer;width:100%;text-transform:uppercase}

.loader{position:absolute;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:300;transition:opacity .3s}
.loader.hide{opacity:0;pointer-events:none}
.toast{position:absolute;top:68px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;font-size:13px;font-weight:700;padding:8px 20px;border-radius:20px;opacity:0;transition:opacity .2s;z-index:150}
.toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">

  <div class="loader" id="loader"><img src="assets/brillo-frijo.gif" width="88" alt=""/><div style="width:28px;height:28px;border:3px solid #eee;border-top-color:#C0157A;border-radius:50%;animation:spin .8s linear infinite"></div></div>
  <div class="toast" id="toast">+1 punto 🫘</div>

  <div class="screen active" id="s-login">
    <div class="login-wrap">
      <div class="beans-stage"><img src="assets/brillo-frijo.gif" class="bbean frijo" alt="Frijo"/><img src="assets/brillo-lito.gif" class="bbean lito" alt="Lito"/></div>
      <div class="brand"><div class="d1">DATA</div><div class="d2"><span class="mg">ES</span> PLATA</div></div>

      <div id="step-auth" style="width:100%;display:flex;flex-direction:column;gap:12px">
        <input class="inp" type="email" id="inp-email" placeholder="Correo electrónico"/>
        <input class="inp" type="password" id="inp-password" placeholder="Contraseña"/>
        <div class="login-err" id="login-err"></div>
        <button class="btn-mg" id="btn-login" onclick="hacerLogin()">Iniciar Sesión</button>
        <div style="text-align:center;font-size:13px;color:#888;margin-top:10px">¿No tienes cuenta?</div>
        <button class="btn-ghost" onclick="mostrarRegistro()">Crear cuenta</button>
      </div>

      <div id="step-register" style="display:none;width:100%;flex-direction:column;gap:12px">
        <input class="inp" type="text" id="reg-nombre" placeholder="Tu nombre completo"/>
        <input class="inp" type="email" id="reg-email" placeholder="Correo electrónico"/>
        <input class="inp" type="password" id="reg-password" placeholder="Crea una contraseña"/>
        <div class="login-err" id="reg-err"></div>
        <button class="btn-mg" id="btn-register" onclick="enviarCodigoRegistro()">Registrarme 🫘</button>
        <button class="btn-ghost" onclick="mostrarLogin()">← Volver al login</button>
      </div>

      <div id="step-otp" style="display:none;width:100%;flex-direction:column;gap:12px;align-items:center">
        <div style="font-size:13px;color:#888;text-align:center">Enviamos un código a:<br><b id="otp-email-show" style="color:#1A1A1A"></b></div>
        <div class="otp-inputs">
          <input class="otp-input" maxlength="1" id="otp0"/><input class="otp-input" maxlength="1" id="otp1"/><input class="otp-input" maxlength="1" id="otp2"/>
          <input class="otp-input" maxlength="1" id="otp3"/><input class="otp-input" maxlength="1" id="otp4"/><input class="otp-input" maxlength="1" id="otp5"/>
        </div>
        <div class="login-err" id="otp-err"></div>
        <button class="btn-mg" id="btn-verificar" onclick="verificarYCrear()">Verificar y Entrar</button>
        <button class="btn-ghost" onclick="mostrarRegistro()">← Cambiar correo</button>
      </div>
    </div>
  </div>

  <div class="screen" id="s-swiper">
    <div class="sw-hdr"><span class="sw-title">¡Desliza y gana! 🫘</span><span class="bpts" id="sw-pts">0 PTS</span></div>
    <div class="sw-body">
      <div class="sw-hint">1 punto por tarjeta</div>
      <div class="sw-prog-wrap"><div class="sw-prog" id="sw-prog" style="width:0%"></div></div>
      <div class="card-stack" id="card-stack"></div>
      <div class="sw-empty" id="sw-empty"><img src="assets/brillo-frijo.gif" style="width:88px"/><div style="font-size:16px;font-weight:700">¡Ya las viste todas!</div><button class="btn-mg" style="width:auto;padding:12px 24px" onclick="goTab('promos')">Ver recompensas</button></div>
      <div class="sw-btns" id="sw-btns"><button class="sw-btn no" onclick="swipeCard(false)">✕</button><button class="sw-btn yes" onclick="swipeCard(true)">♥</button></div>
      <div class="sw-count" id="sw-count"></div>
    </div>
    <div class="bnav"><button class="nb on"><span class="ni">🃏</span>Tarjetas</button><button class="nb" onclick="goTab('promos')"><span class="ni">🎁</span>Recompensas</button><button class="nb" onclick="goTab('profile')"><span class="ni">🫘</span>Perfil</button></div>
  </div>

  <div class="screen" id="s-promos">
    <div class="topbar"><span class="tlogo">Data <span>Es</span> Plata</span><span class="bpts" id="promo-pts">0 PTS</span></div>
    <div class="scrollbody" id="promos-body"></div>
    <div class="bnav"><button class="nb" onclick="goMain()"><span class="ni">🃏</span>Tarjetas</button><button class="nb on"><span class="ni">🎁</span>Recompensas</button><button class="nb" onclick="goTab('profile')"><span class="ni">🫘</span>Perfil</button></div>
  </div>

  <div class="screen" id="s-profile">
    <div class="topbar"><span class="tlogo">Data <span>Es</span> Plata</span><span class="bpts" id="prof-pts">0 PTS</span></div>
    <div class="scrollbody" id="prof-body"></div>
    <div class="bnav"><button class="nb" onclick="goMain()"><span class="ni">🃏</span>Tarjetas</button><button class="nb" onclick="goTab('promos')"><span class="ni">🎁</span>Recompensas</button><button class="nb on"><span class="ni">🫘</span>Perfil</button></div>
  </div>

  <div class="pts-modal" id="conf-modal">
    <div class="pts-box">
      <div class="pts-ico">⚠️</div><div class="pts-title">¿Confirmar canje?</div>
      <div class="pts-msg" id="conf-msg"></div>
      <div style="display:flex;gap:10px"><button style="flex:1;padding:12px;border:none;border-radius:10px;background:#eee" onclick="$('conf-modal').classList.remove('show')">Cancelar</button><button id="conf-btn-yes" style="flex:1;padding:12px;border:none;border-radius:10px;background:#C0157A;color:#fff;font-weight:bold" onclick="executeCanje()">Sí, canjear</button></div>
    </div>
  </div>
  
  <div class="umodal" id="umodal">
    <canvas id="conf-cvs" style="position:absolute;inset:0;pointer-events:none;z-index:201"></canvas>
    <div class="ubox">
      <div class="u-ico-big" id="u-ico">🎁</div><div class="utitle" id="u-title"></div>
      <div class="usub" id="u-sub"></div><div class="ucode">DEP-<span id="u-code"></span></div>
      <button class="btn-mg" onclick="$('umodal').classList.remove('show');stopConf()">¡Entendido!</button>
    </div>
  </div>

  <div class="pts-modal" id="pts-modal"><div class="pts-box"><div class="pts-ico">🔒</div><div class="pts-title">Faltan puntos</div><div class="pts-num" id="pts-num"></div><button class="btn-mg" onclick="$('pts-modal').classList.remove('show');goMain()">Deslizar tarjetas</button></div></div>

</div>

<script>
// ═══════════════════════════════════════════════
//  API Y CONFIGURACIÓN
// ═══════════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyrMsbQm7f7fGE4jjrZ99MTtjnNo06RQT6N4pwWK66m5aVI3E0XG9dHuwvciMQd_ui0/exec';
async function api(params){const r=await fetch(SCRIPT_URL+'?'+new URLSearchParams(params));return r.json();}
async function apiPost(body){const r=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(body)});return r.json();}

const UID_KEY = 'dep_uid';
function genUUID(){return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16)});}
function getOrCreateUID(){let id=localStorage.getItem(UID_KEY);if(!id){id=genUUID();localStorage.setItem(UID_KEY,id);}return id;}

const st={uid:getOrCreateUID(), usuario:null, puntos:0, tarjetas:[], recompensas:[], swipeIdx:0, avatarUrl:null};
const $=id=>document.getElementById(id);

function showScreen(id){['s-login','s-swiper','s-promos','s-profile'].forEach(s=>{const e=$(s);if(e)e.classList.remove('active')});const t=$(id);if(t)t.classList.add('active');}
function goTab(t){showScreen('s-'+t); if(t==='promos') renderPromos(); if(t==='profile') renderProfile();}
function goMain(){showScreen('s-swiper');}
function updatePts(){const p=st.puntos+' PTS';['sw-pts','promo-pts','prof-pts'].forEach(id=>{const e=$(id);if(e)e.textContent=p;});}
function showToast(msg){const t=$('toast');if(!t)return;t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1900);}
function loaderShow(){$('loader').style.display='flex';$('loader').classList.remove('hide');}
function loaderHide(){$('loader').classList.add('hide');setTimeout(()=>$('loader').style.display='none',350);}
function showErr(id,msg){const e=$(id);e.textContent=msg;e.style.display=msg?'block':'none';}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
async function init(){
  const savedEmail = localStorage.getItem('dep_saved_email');
  if(savedEmail) $('inp-email').value = savedEmail;

  try{
    const r=await api({action:'por_cookie',cookie:st.uid});
    if(r.ok&&r.usuario) await procesarLoginExitoso(r.usuario);
  }catch(e){}
  loaderHide();
  setupOTPInputs();
}

// ═══════════════════════════════════════════════
//  FLUJO DE LOGIN Y REGISTRO (CON OTP)
// ═══════════════════════════════════════════════
function mostrarRegistro() {$('step-auth').style.display='none';$('step-otp').style.display='none';$('step-register').style.display='flex';showErr('login-err','');}
function mostrarLogin() {$('step-register').style.display='none';$('step-otp').style.display='none';$('step-auth').style.display='flex';showErr('reg-err','');}

async function hacerLogin() {
  const email = $('inp-email').value.trim();
  const pass = $('inp-password').value;
  if(!email || !pass) return showErr('login-err', 'Ingresa correo y contraseña');
  $('btn-login').disabled = true; loaderShow();
  try {
    const r = await apiPost({action:'login_pass', email, password:pass, cookie_id:st.uid});
    if(!r.ok) throw new Error(r.error);
    localStorage.setItem('dep_saved_email', email);
    await procesarLoginExitoso(r.usuario);
  } catch(e) { showErr('login-err', e.message); }
  $('btn-login').disabled = false; loaderHide();
}

async function enviarCodigoRegistro() {
  const nombre = $('reg-nombre').value.trim();
  const email = $('reg-email').value.trim();
  const pass = $('reg-password').value;
  if(!nombre || !email || !pass) return showErr('reg-err', 'Completa todos los campos');
  if(!email.includes('@')) return showErr('reg-err', 'Correo inválido');

  $('btn-register').disabled = true; loaderShow();
  try {
    const r = await apiPost({action:'enviar_otp', email});
    if(!r.ok) throw new Error(r.error);
    
    // Si el correo se envía, pasamos a validar
    $('step-register').style.display='none';
    $('step-otp').style.display='flex';
    $('otp-email-show').textContent = email;
    for(let i=0;i<6;i++){$('otp'+i).value='';} $('otp0').focus();
    showErr('otp-err','');
  } catch(e) { showErr('reg-err', e.message); }
  $('btn-register').disabled = false; loaderHide();
}

async function verificarYCrear() {
  const nombre = $('reg-nombre').value.trim();
  const email = $('reg-email').value.trim();
  const pass = $('reg-password').value;
  const codigo = [0,1,2,3,4,5].map(i=>$('otp'+i).value).join('');
  
  if(codigo.length<6) return showErr('otp-err','Introduce los 6 dígitos');
  
  $('btn-verificar').disabled = true; loaderShow();
  try {
    const r = await apiPost({action:'registro_otp', email, nombre, password:pass, codigo, cookie_id:st.uid});
    if(!r.ok) throw new Error(r.error);
    localStorage.setItem('dep_saved_email', email);
    await procesarLoginExitoso(r.usuario);
  } catch(e) { showErr('otp-err', e.message); }
  $('btn-verificar').disabled = false; loaderHide();
}

function setupOTPInputs(){
  for(let i=0;i<6;i++){
    const inp=$('otp'+i); if(!inp)continue;
    inp.addEventListener('input',e=>{const v=e.target.value.replace(/\D/g,'');e.target.value=v.slice(-1);if(v&&i<5)$('otp'+(i+1)).focus();});
    inp.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!e.target.value&&i>0)$('otp'+(i-1)).focus();});
  }
}

async function procesarLoginExitoso(usuario) {
  st.usuario = usuario;
  st.puntos = Number(usuario.puntos_restantes||usuario.puntos||0);
  st.swipeIdx=0; 
  await cargarDatos();
  updatePts();
  showScreen('s-swiper');
  renderSwiper();
}

async function cargarDatos(){
  const email=st.usuario?.id_email||st.usuario?.email||'';
  const[rT,rR]=await Promise.all([api({action:'tarjetas',email,cookie:st.uid}),api({action:'recompensas'})]);
  st.tarjetas = rT.tarjetas || [];
  st.recompensas = rR.recompensas || [];
}

// ═══════════════════════════════════════════════
//  SWIPER (Suma de puntos garantizada)
// ═══════════════════════════════════════════════
function renderSwiper(){
  const stack=$('card-stack'),empty=$('sw-empty'),btns=$('sw-btns');
  stack.innerHTML=''; const pend=st.tarjetas.slice(st.swipeIdx);
  if(!pend.length){empty.classList.add('show');btns.style.display='none';$('sw-prog').style.width='100%';return;}
  empty.classList.remove('show');btns.style.display='';
  pend.slice(0,5).reverse().forEach((t,vi)=>{
    const div=document.createElement('div'); div.className='swipe-card'; div.id='sc-'+t.id;
    div.innerHTML=`<div class="ind ind-y">Me late ♥</div><div class="ind ind-n">Paso ✕</div><div class="card-emoji">${t.emoji||'🎁'}</div><div class="card-name">${t.nombre}</div><div class="card-brand">${t.descripcion||''}</div>`;
    const depth=Math.min(4,pend.length-1)-vi; div.style.zIndex=vi+1;
    if(depth>0)div.style.transform=`scale(${1-depth*.03}) translateY(${depth*5}px)`;
    attachDrag(div);stack.appendChild(div);
  });
  $('sw-count').textContent=(st.tarjetas.length-st.swipeIdx)+' restantes';
  $('sw-prog').style.width=(st.swipeIdx/Math.max(st.tarjetas.length,1)*100)+'%';
}

function attachDrag(c){
  let sx=0,drag=false;
  const start=e=>{sx=(e.touches?e.touches[0].clientX:e.clientX);drag=true;c.style.transition='none';};
  const move=e=>{if(!drag)return;const dx=(e.touches?e.touches[0].clientX:e.clientX)-sx;c.style.transform=`translateX(${dx}px) rotate(${dx*.06}deg)`;const iy=c.querySelector('.ind-y'),in_=c.querySelector('.ind-n');if(iy)iy.style.opacity=dx>28?Math.min((dx-28)/40,1):0;if(in_)in_.style.opacity=dx<-28?Math.min((-dx-28)/40,1):0;if(e.cancelable)e.preventDefault();};
  const end=e=>{if(!drag)return;drag=false;c.style.transition='';const dx=(e.changedTouches?e.changedTouches[0].clientX:e.clientX)-sx;c.querySelectorAll('.ind').forEach(i=>i.style.opacity=0);if(dx>60)swipeCard(true);else if(dx<-60)swipeCard(false);else c.style.transform='';};
  c.addEventListener('mousedown',start);c.addEventListener('touchstart',start,{passive:true});
  document.addEventListener('mousemove',move);document.addEventListener('touchmove',move,{passive:false});
  document.addEventListener('mouseup',end);document.addEventListener('touchend',end);
}

async function swipeCard(like){
  if(st.swipeIdx>=st.tarjetas.length)return;
  const t=st.tarjetas[st.swipeIdx]; const card=$('sc-'+t.id); if(card)card.classList.add(like?'liked':'gone');
  st.swipeIdx++;
  const email=st.usuario?.id_email||st.usuario?.email||'';
  
  // Actualización instantánea en frontend (optimista)
  st.puntos++; updatePts(); showToast('+1 punto 🫘');
  
  apiPost({action:'swipe',email,cookie_id:st.uid,tarjeta_id:t.id,like})
    .then(r=>{if(r.ok){st.puntos=r.puntos_restantes; updatePts();}}).catch(()=>{});
  setTimeout(renderSwiper,300);
}

// ═══════════════════════════════════════════════
//  RECOMPENSAS Y CANJE
// ═══════════════════════════════════════════════
function renderPromos(){
  const body=$('promos-body');if(!body)return;
  $('promo-pts').textContent=st.puntos+' PTS';
  if(!st.recompensas.length){body.innerHTML='<div class="empty-state">No hay recompensas disponibles.</div>';return;}

  const activas=st.recompensas.filter(r=>st.puntos>=Number(r.puntos_requeridos||r['puntos requeridos']||0));
  const bloqueadas=st.recompensas.filter(r=>st.puntos<Number(r.puntos_requeridos||r['puntos requeridos']||0));

  let html='';
  if(activas.length){
    html+=`<div class="slbl">Disponibles 🔥</div>`;
    activas.forEach(r=>{
      const pts = Number(r.puntos_requeridos||r['puntos requeridos']||0);
      html+=`<div class="pc" onclick="tryUnlock('${r.emoji||'🎁'}','${r.nombre}','${r.instrucciones_canje||''}','${r.id}','recompensa',${pts})"><div class="pci" style="background:#FFF5FA">${r.emoji||'🎁'}</div><div class="pci-info"><div class="pci-name">${r.nombre}</div><div class="pci-meta">${pts} pts</div></div><span class="ptag ptag-ok">Canjear</span></div>`;
    });
  }
  if(bloqueadas.length){
    html+=`<div class="slbl">Bloqueadas 🔒</div>`;
    bloqueadas.forEach(r=>{
      const pts = Number(r.puntos_requeridos||r['puntos requeridos']||0); const faltan = pts-st.puntos;
      html+=`<div class="pc locked" onclick="$('pts-num').textContent='Faltan '+${faltan}+' pts';$('pts-modal').classList.add('show')"><div class="pci">${r.emoji||'🎁'}</div><div class="pci-info"><div class="pci-name">${r.nombre}</div><div class="pci-meta">Faltan ${faltan} pts</div></div><span class="ptag ptag-lk">🔒 ${pts}</span></div>`;
    });
  }
  body.innerHTML=html;
}

let pendingCanje = null;
function tryUnlock(ico, title, instrucciones, id, tipo, coste){
  pendingCanje = {ico, title, instrucciones, id, tipo};
  $('conf-msg').innerHTML = `Se descontarán <b style="color:#C0157A;font-size:16px">${coste} frijoles</b> de tu saldo.`;
  $('conf-modal').classList.add('show');
}

async function executeCanje() {
  if(!pendingCanje) return;
  const {ico, title, instrucciones, id, tipo} = pendingCanje;
  $('conf-btn-yes').disabled = true; $('conf-btn-yes').textContent = 'Procesando...';
  const email = st.usuario?.id_email || st.usuario?.email || '';
  
  try {
    const r = await apiPost({action:'canje', email, cookie_id:st.uid, recompensa_id:id, tipo});
    if(r.ok) {
      st.puntos = r.puntos_restantes; updatePts();
      $('conf-modal').classList.remove('show');
      $('u-ico').textContent = ico; $('u-title').textContent = title; $('u-sub').textContent = instrucciones; $('u-code').textContent = r.codigo;
      $('umodal').classList.add('show'); setTimeout(startConf, 60);
      renderPromos();
    } else { alert("Error: " + r.error); $('conf-modal').classList.remove('show'); }
  } catch(e) { alert("Error de conexión"); $('conf-modal').classList.remove('show'); }
  $('conf-btn-yes').disabled = false; $('conf-btn-yes').textContent = 'Sí, canjear';
}

// ═══════════════════════════════════════════════
//  PERFIL COMPLETO (Restaurado)
// ═══════════════════════════════════════════════
function renderProfile(){
  const body=$('prof-body');if(!body)return;
  $('prof-pts').textContent=st.puntos+' PTS';
  const u=st.usuario||{}; const email=u.id_email||u.email||''; const nombre=u.nombre||email.split('@')[0]||'Usuario';
  const initials=nombre.split(' ').map(p=>p[0]||'').join('').toUpperCase().slice(0,2)||'U';
  
  body.innerHTML=`
    <div class="ph">
      <div class="av" onclick="$('avatar-inp').click()">${st.avatarUrl?`<img src="${st.avatarUrl}"/>`:initials}</div>
      <div><div class="pname">${nombre}</div><div class="prole">${email}</div></div>
    </div>
    
    <div class="slbl">Mis Datos</div>
    <div class="pf-field"><label>Nombre</label><input type="text" id="pf-nombre" value="${u.nombre||''}"/></div>
    <div class="pf-field"><label>Género</label><select id="pf-genero"><option value="">Selecciona</option><option value="Hombre" ${u.genero==='Hombre'?'selected':''}>Hombre</option><option value="Mujer" ${u.genero==='Mujer'?'selected':''}>Mujer</option><option value="Otro" ${u.genero==='Otro'?'selected':''}>Otro</option></select></div>
    <div class="pf-field"><label>Fecha de nacimiento</label><input type="date" id="pf-nacimiento" value="${u.fecha_nacimiento||''}"/></div>
    <div class="pf-field"><label>Situación sentimental</label><select id="pf-sentimental"><option value="">Selecciona</option><option value="Soltero/a" ${u.situacion_sentimental==='Soltero/a'?'selected':''}>Soltero/a</option><option value="En pareja" ${u.situacion_sentimental==='En pareja'?'selected':''}>En pareja</option></select></div>
    <div class="pf-field"><label>¿Hijos?</label><select id="pf-hijos"><option value="">Selecciona</option><option value="No" ${u.hijos==='No'?'selected':''}>No</option><option value="Sí" ${u.hijos==='Sí'?'selected':''}>Sí</option></select></div>
    <div class="pf-field"><label>¿Mascotas?</label><select id="pf-mascotas"><option value="">Selecciona</option><option value="Perro" ${u.mascotas==='Perro'?'selected':''}>Perro</option><option value="Gato" ${u.mascotas==='Gato'?'selected':''}>Gato</option><option value="No" ${u.mascotas==='No'?'selected':''}>No</option></select></div>
    <button class="btn-mg" style="margin-top:10px" onclick="guardarPerfil()">Guardar Perfil</button>
    <input type="file" id="avatar-inp" accept="image/*" style="display:none" onchange="onAvatarChange(this)"/>
    
    <button class="updbtn" style="margin-top:20px" onclick="logout()">Cerrar sesión</button>
  `;
}

function onAvatarChange(inp){const f=inp.files?.[0];if(!f)return;const r=new FileReader();r.onload=e=>{st.avatarUrl=e.target.result; renderProfile();};r.readAsDataURL(f);}

async function guardarPerfil(){
  const email=st.usuario?.id_email||st.usuario?.email||'';
  const perfil={nombre:$('pf-nombre').value, genero:$('pf-genero').value, fecha_nacimiento:$('pf-nacimiento').value, situacion_sentimental:$('pf-sentimental').value, hijos:$('pf-hijos').value, mascotas:$('pf-mascotas').value};
  if(st.usuario) Object.assign(st.usuario, perfil);
  try{await apiPost({action:'perfil',email,cookie_id:st.uid,perfil});showToast('✓ Guardado');}catch(e){showToast('Error al guardar');}
}

function logout(){
  st.usuario=null; st.puntos=0; st.tarjetas=[]; st.recompensas=[]; st.swipeIdx=0;
  $('inp-password').value=''; $('reg-password').value=''; $('inp-email').value='';
  showScreen('s-login');
}

// CONFETTI
let cP=[],cR=null,cCvs=null,cCtx=null;
const COLS=['#C0157A','#1A1A1A','#F5D0E8','#FFD700','#00C2A8'];
function mkPart(c){return{x:Math.random()*c.width,y:-20,w:Math.random()*12+5,h:Math.random()*5+3,color:COLS[Math.random()*COLS.length|0],r:Math.random()*6,vx:(Math.random()-.5)*3.5,vy:Math.random()*4+1.5,vr:(Math.random()-.5)*.22};}
function startConf(){cCvs=$('conf-cvs');cCtx=cCvs.getContext('2d');cCvs.width=390;cCvs.height=700;cP=Array.from({length:100},()=>mkPart(cCvs));animConf();}
function animConf(){cCtx.clearRect(0,0,cCvs.width,cCvs.height);let alive=false;cP.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;p.vy+=.1;if(p.y<800)alive=true;cCtx.save();cCtx.translate(p.x,p.y);cCtx.rotate(p.r);cCtx.fillStyle=p.color;cCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cCtx.restore();});if(alive)cR=requestAnimationFrame(animConf);}
function stopConf(){if(cR)cancelAnimationFrame(cR);if(cCtx)cCtx.clearRect(0,0,cCvs.width,cCvs.height);}

document.addEventListener('DOMContentLoaded',init);
</script>
