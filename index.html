<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Data Es Plata</title>
<style>
  /* --- TUS ESTILOS EXISTENTES --- */
  :root { --mg: #C0157A; --blk: #1A1A1A; }
  body { font-family: sans-serif; margin: 0; background: #f0f0f0; }
  #app { max-width: 400px; margin: 0 auto; background: #fff; height: 100vh; position: relative; overflow: hidden; display: flex; flex-direction: column; }
  .topbar { background: var(--blk); color: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
  
  /* MODAL CONFIRMACIÓN (NUEVO) */
  .conf-modal { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 20px; }
  .conf-modal.active { display: flex; }
  .conf-box { background: #fff; padding: 25px; border-radius: 20px; text-align: center; width: 100%; }
  .conf-btns { display: flex; gap: 10px; margin-top: 20px; }
  .btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
  .btn-yes { background: var(--mg); color: #fff; }
  .btn-no { background: #eee; }

  /* OTROS ESTILOS BREVES PARA EJEMPLO */
  .screen { display: none; flex: 1; }
  .screen.active { display: flex; flex-direction: column; }
  .card-container { flex: 1; position: relative; margin: 20px; }
  .card { position: absolute; width: 100%; height: 100%; background: #eee; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: transform 0.3s; }
</style>
</head>
<body>

<div id="app">
  <div class="topbar">
    <span>DATA ES PLATA</span>
    <span id="pts-display">0 FP</span>
  </div>

  <div id="s-swiper" class="screen active">
    <div class="card-container" id="card-stack"></div>
  </div>

  <div id="conf-modal" class="conf-modal">
    <div class="conf-box">
      <h3>¿Confirmar Canje?</h3>
      <p id="conf-txt"></p>
      <div class="conf-btns">
        <button class="btn btn-no" onclick="closeConf()">Cancelar</button>
        <button class="btn btn-yes" id="btn-exec" onclick="confirmarCanjeReal()">Confirmar</button>
      </div>
    </div>
  </div>
</div>

<script>
  let state = {
    uid: localStorage.getItem('dataesplata_uid') || 'uid_' + Math.random().toString(36).substr(2,9),
    user: null,
    tarjetas: [],
    recompensas: [],
    concursos: [],
    pending: null
  };
  localStorage.setItem('dataesplata_uid', state.uid);

  async function init() {
    const res = await fetch('https://script.google.com/macros/s/AKfycbyrMsbQm7f7fGE4jjrZ99MTtjnNo06RQT6N4pwWK66m5aVI3E0XG9dHuwvciMQd_ui0/exec', {
      method: 'POST',
      body: JSON.stringify({ action: 'get_data', cookie_id: state.uid })
    }).then(r => r.json());

    if (res.ok) {
      state.user = res.usuario;
      state.tarjetas = res.tarjetas;
      updateUI();
      renderStack();
    }
  }

  function updateUI() {
    const pts = state.user ? state.user.puntos_restantes : 0;
    document.getElementById('pts-display').innerText = pts + ' FP';
  }

  function renderStack() {
    const container = document.getElementById('card-stack');
    container.innerHTML = '';
    state.tarjetas.forEach((t, i) => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerText = t.titulo;
      div.style.zIndex = state.tarjetas.length - i;
      container.appendChild(div);
      // Aquí iría tu lógica de Hammer.js para el swipe
    });
  }

  // LÓGICA DE CANJE CON MODAL
  function pedirCanje(id, nombre, coste, tipo) {
    state.pending = { id, coste, tipo };
    document.getElementById('conf-txt').innerText = `Vas a canjear ${coste} frijoles por: ${nombre}`;
    document.getElementById('conf-modal').classList.add('active');
  }

  function closeConf() {
    document.getElementById('conf-modal').classList.remove('active');
  }

  async function confirmarCanjeReal() {
    const btn = document.getElementById('btn-exec');
    btn.disabled = true;
    btn.innerText = 'Procesando...';

    const res = await fetch('TU_URL_DE_APPS_SCRIPT', {
      method: 'POST',
      body: JSON.stringify({
        action: 'canje',
        cookie_id: state.uid,
        recompensa_id: state.pending.id,
        tipo: state.pending.tipo
      })
    }).then(r => r.json());

    if (res.ok) {
      state.user.puntos_restantes = res.puntos_restantes;
      updateUI();
      alert("¡Canje exitoso! Tu código es: " + res.codigo);
    } else {
      alert("Error: " + res.error);
    }

    btn.disabled = false;
    btn.innerText = 'Confirmar';
    closeConf();
  }

  init();
</script>
</body>
</html>
